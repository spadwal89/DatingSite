$kind: http-request
url: "{{url}}/api/login"
method: POST
body:
  type: json
  content: |-
    {
    	"email": "lisa@test.com",
    	"password": "Pa$$w0rd"
    }
scripts:
  - type: afterResponse
    code: |-
      const user = pm.response.json();

      pm.test("Has properties", function () {
          pm.expect(user).to.have.property('accessToken');
      });

      if (pm.test("Has properties")) {
          pm.globals.set('token', user.accessToken);
      }
    language: text/javascript
order: 1000
