$kind: http-request
url: "{{url}}/api/login?useCookies=true"
method: POST
queryParams:
  useCookies: "true"
body:
  type: json
  content: |-
    {
    	"email": "bob@test.com",
    	"password": "Pa$$w0rd"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Has Set-Cookie header", function () {
          const cookies = pm.response.headers.get('Set-Cookie');
          pm.expect(cookies).to.include('.AspNetCore.Identity.Application=');
      });
    language: text/javascript
order: 10000
